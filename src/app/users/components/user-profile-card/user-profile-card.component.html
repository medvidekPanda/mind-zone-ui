<p-card class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden text-center">
  <div class="flex flex-col items-center py-6">
    @if (user()) {
      <p-avatar
        [label]="(user()!.firstName || '')[0] + (user()!.lastName || '')[0]"
        shape="circle"
        size="xlarge"
        class="bg-slate-800 text-white font-bold mb-4 border-4 border-white shadow-md"
      />
      <h2 class="m-0 text-xl font-bold text-slate-900">{{ user()!.firstName }} {{ user()!.lastName }}</h2>
      <p-tag
        [value]="user()!.role === UserRole.USER ? 'Uživatel' : 'Administrátor'"
        [severity]="user()!.role === UserRole.ADMIN ? 'warn' : 'info'"
        [rounded]="true"
        class="mt-2"
      />
    } @else {
      <p-avatar
        icon="pi pi-user"
        shape="circle"
        size="xlarge"
        class="bg-slate-100 text-slate-400 mb-4 border-4 border-white shadow-md"
      />
      <h2 class="m-0 text-xl font-bold text-slate-400">Nový uživatel</h2>
    }
  </div>
</p-card>
