@let _user = user();

<app-page-header
  [title]="isNewUser ? 'Nový uživatel' : editing() ? 'Úprava uživatele' : 'Detail uživatele: ' + _user?.firstName + ' ' + _user?.lastName"
>
  <div actions class="flex gap-2">
    <a
      routerLink="/users"
      pButton
      label="Zpět na seznam"
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
    ></a>
    @if (!editing() && !isNewUser) {
      <button
        (click)="startEdit()"
        type="button"
        pButton
        label="Upravit uživatele"
        icon="pi pi-user-edit"
      ></button>
    }
  </div>
</app-page-header>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-1">
    <app-user-profile-card [user]="_user" />
    <app-user-stats class="mt-6" />
    <div class="mt-6">
      @if (_user?.id) {
        <a
          [routerLink]="['/users', _user!.id, 'clients']"
          class="p-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 transition-all flex items-center justify-between no-underline text-slate-700 shadow-sm block"
        >
          <span class="font-semibold">Klienti uživatele</span>
          <i class="pi pi-chevron-right text-slate-400"></i>
        </a>
      } @else {
        <div class="p-4 rounded-xl border border-slate-200 bg-slate-50 flex items-center justify-between text-slate-400 cursor-not-allowed">
          <span class="font-semibold">Klienti uživatele</span>
          <i class="pi pi-chevron-right"></i>
        </div>
      }
    </div>
  </div>

  <div class="lg:col-span-2">
    <p-card
      header="Údaje uživatele"
      class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden h-full"
    >
      <app-user-form
        [readonly]="!editing()"
        [showActions]="editing()"
        (saved)="onSaved()"
        (cancelled)="onCancelled()"
      />
    </p-card>
  </div>
</div>
