@if (isNewUser()) {
  <app-user-create
    [user]="user()"
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancel)="cancel()"
  />
} @else {
  <app-user-edit
    [user]="user()"
    [editing]="editing()"
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancelEdit)="cancelEdit()"
    (startEdit)="startEdit()"
  />
}
