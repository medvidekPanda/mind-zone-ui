<app-page-header
  [title]="editing() ? 'Úprava uživatele' : 'Detail uživatele: ' + user().firstName + ' ' + user().lastName"
>
  <div
    actions
    class="flex gap-2"
  >
    <a
      routerLink="/users"
      pButton
      label="Zpět na seznam"
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
    ></a>
    @if (editing()) {
      <button
        (click)="cancelEdit.emit()"
        type="button"
        pButton
        label="Zrušit úpravy"
        icon="pi pi-times"
        severity="secondary"
      ></button>
      <button
        (click)="save.emit()"
        type="button"
        pButton
        label="Uložit"
        icon="pi pi-check"
      ></button>
    } @else {
      <button
        (click)="startEdit.emit()"
        type="button"
        pButton
        label="Upravit uživatele"
        icon="pi pi-user-edit"
      ></button>
    }
  </div>
</app-page-header>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-1">
    <app-user-profile-card [user]="user()" />

    <app-user-stats class="mt-6" />

    <div class="mt-6">
      <a
        [routerLink]="['/users', user().id, 'clients']"
        class="p-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 transition-all flex items-center justify-between no-underline text-slate-700 shadow-sm block"
      >
        <span class="font-semibold">Klienti uživatele</span>
        <i class="pi pi-chevron-right text-slate-400"></i>
      </a>
    </div>
  </div>

  <div class="lg:col-span-2 space-y-6">
    <p-card
      [header]="editing() ? 'Úprava uživatele' : 'Údaje uživatele'"
      class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden h-full"
    >
      <app-user-form
        [userDetail]="user()"
        [readonly]="!editing()"
        (formChanged)="formChanged.emit($event)"
      />
    </p-card>
  </div>
</div>
