<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900 m-0">Uživatelé</h1>
    <p class="text-sm text-slate-500 m-0 mt-1">Správa uživatelů a jejich rolí</p>
  </div>
  <a
    routerLink="/users/new"
    pButton
    label="Nový uživatel"
    icon="pi pi-plus"
  ></a>
</div>

<!-- Table card -->
<div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-x-auto">
  @let _users = users();

  <p-table
    #usersTable
    [value]="_users"
    [scrollable]="true"
    scrollHeight="flex"
    [globalFilterFields]="['firstName', 'lastName', 'email']"
    [filterDelay]="300"
    class="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr class="bg-slate-800 text-white">
        <th class="!bg-slate-800 !text-slate-300 !font-semibold !text-xs !uppercase !tracking-wide px-6 py-4">
          Uživatel
        </th>
        <th class="!bg-slate-800 !text-slate-300 !font-semibold !text-xs !uppercase !tracking-wide px-6 py-4">
          E-mail
        </th>
        <th
          class="!bg-slate-800 !text-slate-300 !font-semibold !text-xs !uppercase !tracking-wide px-6 py-4 text-center"
        >
          Role
        </th>
        <th
          class="!bg-slate-800 !text-slate-300 !font-semibold !text-xs !uppercase !tracking-wide px-6 py-4 text-right"
        >
          Akce
        </th>
      </tr>
      <tr class="!bg-slate-100 !border-b border-slate-200">
        <th class="!bg-slate-100 !border-0 px-6 py-2">
          <p-iconfield class="w-full">
            <p-inputicon class="pi pi-search" />
            <input
              pInputText
              type="text"
              #globalFilterRef
              (input)="usersTable.filterGlobal(globalFilterRef.value, 'contains')"
              placeholder="Vyhledat uživatele…"
              class="w-full text-sm"
            />
          </p-iconfield>
        </th>

        <th class="!bg-slate-100 !border-0 px-6 py-2">
          <p-iconfield class="w-full">
            <p-inputicon class="pi pi-envelope" />
            <input
              pInputText
              type="text"
              #emailFilterRef
              (input)="usersTable.filter(emailFilterRef.value, 'email', 'contains')"
              placeholder="Filtrovat e-mail…"
              class="w-full text-sm"
            />
          </p-iconfield>
        </th>

        <th class="!bg-slate-100 !border-0 px-6 py-2">
          <p-select
            [options]="roleOptions"
            [ngModel]="roleFilter()"
            (ngModelChange)="onRoleFilterChange($event, usersTable, globalFilterRef)"
            optionLabel="label"
            optionValue="value"
            placeholder="Role"
            [showClear]="true"
            class="w-full text-sm"
          />
        </th>
        <th class="!bg-slate-100 !border-0 px-6 py-2"></th>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-user
    >
      <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 rounded-full bg-slate-800 text-white flex items-center justify-center text-sm font-bold shrink-0"
            >
              {{ user.firstName[0] }}{{ user.lastName[0] }}
            </div>
            <div>
              <p class="font-semibold text-slate-900 m-0 text-sm">{{ user.firstName }} {{ user.lastName }}</p>
            </div>
          </div>
        </td>

        <td class="px-6 py-4 text-sm text-slate-600">{{ user.email }}</td>

        <td class="px-6 py-4 text-center">
          <p-tag
            [value]="user.role === UserRole.THERAPIST ? 'Terapeut' : 'Administrátor'"
            [severity]="user.role === UserRole.ADMIN ? 'warn' : 'info'"
            [rounded]="true"
          />
        </td>

        <td class="px-6 py-4 text-right">
          <div class="flex justify-end gap-1">
            <a
              [routerLink]="['/users', user.id]"
              pButton
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              size="small"
              pTooltip="Upravit"
              role="button"
            ></a>

            <a
              [routerLink]="['/users', user.id, 'clients']"
              pButton
              icon="pi pi-users"
              [rounded]="true"
              [text]="true"
              severity="secondary"
              size="small"
              pTooltip="Klienti"
            ></a>

            <button
              type="button"
              pButton
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              size="small"
              (click)="deleteUser(user.id)"
              pTooltip="Smazat"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td
          colspan="4"
          class="py-16 text-center text-slate-400 italic"
        >
          <i class="pi pi-users text-4xl block mb-3 opacity-20"></i>
          Žádní uživatelé nebyli nalezeni.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
