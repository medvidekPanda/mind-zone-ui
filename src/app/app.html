<div class="flex min-h-screen bg-slate-100">

  <!-- ─── Desktop Sidebar ─── -->
  <aside class="hidden md:flex fixed inset-y-0 left-0 w-64 bg-slate-900 flex-col z-40">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-700/60">
      <div class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center text-white font-bold text-sm">MZ</div>
      <span class="text-white font-bold text-lg tracking-tight">Mind Zone</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <ng-container *ngTemplateOutlet="navItems"></ng-container>
    </nav>

    <!-- User footer -->
    <div class="px-4 py-4 border-t border-slate-700/60">
      <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-800 cursor-pointer transition-colors">
        <div class="w-9 h-9 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold shrink-0">PT</div>
        <div class="flex flex-col min-w-0">
          <span class="text-sm font-semibold text-white truncate">Petr Terapeut</span>
          <span class="text-xs text-slate-400 truncate">Administrátor</span>
        </div>
        <i class="pi pi-ellipsis-v text-slate-500 ml-auto"></i>
      </div>
    </div>
  </aside>

  <!-- ─── Mobile Drawer ─── -->
  <p-drawer
    [visible]="sidebarVisible()"
    (visibleChange)="sidebarVisible.set($event)"
    [modal]="true"
    [dismissible]="true"
    class="!bg-slate-900 !border-0 !w-72"
  >
    <ng-template #header>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center text-white font-bold text-sm">MZ</div>
        <span class="text-white font-bold text-lg">Mind Zone</span>
      </div>
    </ng-template>
    <nav class="space-y-1 py-2">
      <ng-container *ngTemplateOutlet="navItems"></ng-container>
    </nav>
  </p-drawer>

  <!-- ─── Shared Nav Items Template ─── -->
  <ng-template #navItems>
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mb-2 mt-2">Hlavní menu</p>
    <a routerLink="/dashboard" routerLinkActive="bg-teal-600 text-white shadow-sm" [routerLinkActiveOptions]="{ exact: true }"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all no-underline group"
       (click)="closeSidebarOnNav()" pRipple>
      <i class="pi pi-th-large w-5 text-center group-[.bg-teal-600]:text-white"></i>
      <span class="font-medium text-sm">Dashboard</span>
    </a>
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mb-2 mt-5">Správa</p>
    <a routerLink="/users" routerLinkActive="bg-teal-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all no-underline group"
       (click)="closeSidebarOnNav()" pRipple>
      <i class="pi pi-users w-5 text-center group-[.bg-teal-600]:text-white"></i>
      <span class="font-medium text-sm">Terapeuti</span>
    </a>
    <a routerLink="/clients" routerLinkActive="bg-teal-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all no-underline group"
       (click)="closeSidebarOnNav()" pRipple>
      <i class="pi pi-id-card w-5 text-center group-[.bg-teal-600]:text-white"></i>
      <span class="font-medium text-sm">Klienti</span>
    </a>
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mb-2 mt-5">Sezení</p>
    <a routerLink="/sessions" routerLinkActive="bg-teal-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all no-underline group"
       (click)="closeSidebarOnNav()" pRipple>
      <i class="pi pi-calendar w-5 text-center group-[.bg-teal-600]:text-white"></i>
      <span class="font-medium text-sm">Seznam sezení</span>
    </a>
    <a routerLink="/sessions/calendar" routerLinkActive="bg-teal-600 text-white shadow-sm"
       class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all no-underline group"
       (click)="closeSidebarOnNav()" pRipple>
      <i class="pi pi-calendar-plus w-5 text-center group-[.bg-teal-600]:text-white"></i>
      <span class="font-medium text-sm">Kalendář</span>
    </a>
  </ng-template>

  <!-- ─── Main content ─── -->
  <div class="flex-1 flex flex-col min-w-0 md:ml-64">

    <!-- Header -->
    <header class="sticky top-0 z-30 flex items-center h-16 px-6 bg-white border-b border-slate-200 shadow-sm">
      <p-button icon="pi pi-bars" [rounded]="true" [text]="true" class="md:hidden mr-3" (click)="toggleSidebar()" aria-label="Menu" />
      <div class="flex items-center gap-2 md:hidden">
        <span class="font-bold text-slate-800">Mind Zone</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <p-button icon="pi pi-bell" [rounded]="true" [text]="true" severity="secondary" pBadge="3" />
        <p-button icon="pi pi-cog" [rounded]="true" [text]="true" severity="secondary" />
        <div class="hidden md:flex items-center gap-2 ml-2 pl-4 border-l border-slate-200">
          <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold">PT</div>
          <span class="text-sm font-medium text-slate-700">Petr Terapeut</span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-6 md:p-8">
      <router-outlet />
    </main>

  </div>
</div>
