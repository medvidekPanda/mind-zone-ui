<div class="flex flex-col bg-slate-100 overflow-hidden fixed inset-0">
  <header class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm">
    <p-menubar
      [model]="menuItems"
      breakpoint="960px"
      class="!border-0 !rounded-none !bg-white"
    >
      <ng-template #start>
        <a
          routerLink="/dashboard"
          class="flex items-center gap-2 no-underline text-slate-900 font-bold text-lg mr-6"
          title="Tato aplikace je ve fázi alpha – funkce se mohou měnit"
        >
          <span
            class="w-8 h-8 shrink-0 rounded-lg bg-teal-500 flex items-center justify-center text-white text-sm font-bold"
            >MZ</span
          >
          <span class="flex flex-col items-start">
            <span class="text-[10px] font-semibold text-amber-600 uppercase tracking-wide leading-none">Alpha</span>
            <span>Mind Zone</span>
          </span>
        </a>
      </ng-template>
      <ng-template #end>
        <div class="flex items-center gap-2">
          <p-button
            icon="pi pi-bell"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            pBadge="3"
          />
          <p-button
            icon="pi pi-cog"
            [rounded]="true"
            [text]="true"
            severity="secondary"
          />
          <div class="hidden md:flex items-center gap-2 ml-2 pl-4 border-l border-slate-200">
            <p-menu #userMenu [model]="userMenuItems" [popup]="true" />
            <button
              type="button"
              class="flex items-center gap-2 cursor-pointer rounded-lg px-2 py-1 hover:bg-slate-100 transition-colors"
              (click)="userMenu.toggle($event)"
            >
              <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold">
                {{ displayInitials() }}
              </div>
              <span class="text-sm font-medium text-slate-700">{{ displayName() }}</span>
              <i class="pi pi-chevron-down text-xs text-slate-400"></i>
            </button>
          </div>
        </div>
      </ng-template>
    </p-menubar>
  </header>

  <main class="flex-1 p-3 sm:p-6 md:p-8 overflow-hidden">
    <router-outlet />
  </main>
</div>
