<app-page-header title="Naplánovat sezení">
  <a routerLink="/sessions" pButton label="Zpět" icon="pi pi-arrow-left" actions></a>
</app-page-header>

<p-card>
  <form class="flex flex-col gap-4 max-w-2xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="therapist">Terapeut</label>
        <p-select
          id="therapist"
          [options]="therapistOptions"
          [(ngModel)]="therapist"
          name="therapist"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        ></p-select>
      </div>
      <div class="flex flex-col gap-2">
        <label for="client">Klient</label>
        <p-select
          id="client"
          [options]="clientOptions"
          [(ngModel)]="client"
          name="client"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        ></p-select>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <label for="dateTime">Datum a čas</label>
      <input pInputText id="dateTime" [(ngModel)]="dateTime" name="dateTime" placeholder="RRRR-MM-DD HH:mm" class="w-full" />
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="form">Forma</label>
        <p-select
          id="form"
          [options]="formOptions"
          [(ngModel)]="form"
          name="form"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        ></p-select>
      </div>
      <div class="flex flex-col gap-2">
        <label for="type">Typ</label>
        <p-select
          id="type"
          [options]="typeOptions"
          [(ngModel)]="type"
          name="type"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        ></p-select>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="duration">Délka (min)</label>
        <p-inputNumber id="duration" [(ngModel)]="duration" name="duration" [min]="15" [max]="180" [step]="15" class="w-full"></p-inputNumber>
      </div>
      <div class="flex flex-col gap-2">
        <label for="price">Cena (Kč)</label>
        <p-inputNumber id="price" [(ngModel)]="price" name="price" [min]="0" class="w-full"></p-inputNumber>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <p-checkbox [(ngModel)]="paid" name="paid" [binary]="true" inputId="paid"></p-checkbox>
      <label for="paid">Zaplaceno</label>
    </div>
    <div class="flex flex-col gap-2">
      <label for="tags">Tagy</label>
      <p-multiSelect
        id="tags"
        [options]="tagOptions"
        [(ngModel)]="tags"
        name="tags"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte tagy"
        class="w-full"
      ></p-multiSelect>
    </div>
    <div class="flex flex-col gap-2">
      <label for="notes">Poznámky</label>
      <textarea pInputText id="notes" [(ngModel)]="notes" name="notes" rows="4" class="w-full"></textarea>
    </div>
    <div class="flex flex-col gap-2">
      <label for="nextSession">Další konzultace (datum a čas)</label>
      <input pInputText id="nextSession" [(ngModel)]="nextSession" name="nextSession" placeholder="Placeholder – blokace termínů a .ics v backendu" class="w-full" />
    </div>
    <div class="flex gap-2">
      <button type="button" pButton label="Uložit" icon="pi pi-check" (click)="save()"></button>
      <a routerLink="/sessions" pButton label="Zrušit" severity="secondary" text></a>
    </div>
  </form>
</p-card>
