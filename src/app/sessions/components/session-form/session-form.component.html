<form class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <!-- Main column: session notes -->
  <div class="lg:col-span-2 space-y-5">
    <!-- Session notes -->
    <div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm overflow-hidden">
      <div class="px-5 pt-5 pb-3 border-b border-surface-100 flex items-center gap-2">
        <i class="pi pi-file-edit text-surface-500"></i>
        <h3 class="m-0 text-base font-bold text-surface-800">Zápis ze sezení</h3>
        <span class="ml-auto text-xs text-surface-400 italic">Důvěrné</span>
      </div>

      <div class="p-5 space-y-4">
        <div class="flex flex-col gap-1">
          <label
            for="notes"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Průběh a obsah sezení</label
          >
          <textarea
            pInputText
            id="notes"
            [formField]="sessionForm.notes"
            rows="10"
            placeholder="Co se na sezení dělo, jaká témata se otevřela, jak klient reagoval…"
            class="w-full resize-y font-serif leading-relaxed"
          ></textarea>
        </div>
        <div class="flex flex-col gap-1">
          <label
            for="nextPlan"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Plán pro příští sezení</label
          >
          <textarea
            pInputText
            id="nextPlan"
            [formField]="sessionForm.nextPlan"
            rows="3"
            placeholder="Čemu se věnovat příště, domácí úkoly pro klienta…"
            class="w-full resize-y"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Session topics -->
    <div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm p-5">
      <div class="flex items-center gap-2 mb-3">
        <i class="pi pi-tag text-surface-400"></i>
        <label
          for="tags"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Témata sezení</label
        >
      </div>
      <p-multiSelect
        id="tags"
        [options]="tagOptions"
        [(ngModel)]="tags"
        name="tags"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte témata nebo diagnózy"
        [disabled]="readonly()"
        class="w-full"
      ></p-multiSelect>
    </div>
  </div>

  <!-- Side panel: metadata and payment -->
  <div class="space-y-5">
    <!-- Basic details -->
    <div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm p-5 space-y-4">
      <h4 class="m-0 text-xs font-semibold text-surface-400 uppercase tracking-wide">Základní údaje</h4>

      <div class="flex flex-col gap-1">
        <label
          for="clientId"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Klient</label
        >
        <app-form-select
          id="clientId"
          [formField]="sessionForm.clientId"
          [options]="clientOptions()"
          placeholder="Vyberte klienta"
          [showClear]="true"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label
          for="therapistId"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Terapeut</label
        >
        <app-form-select
          id="therapistId"
          [formField]="sessionForm.therapistId"
          [options]="therapistOptions"
          placeholder="Vyberte terapeuta"
          [showClear]="true"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label
          for="date"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Datum</label
        >
        <app-form-datepicker
          id="date"
          [formField]="sessionForm.date"
          placeholder="Datum"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label
            for="startTime"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Začátek</label
          >
          <p-datepicker
            id="startTime"
            [(ngModel)]="startTime"
            name="startTime"
            timeOnly
            placeholder="HH:mm"
            [disabled]="readonly()"
            class="w-full"
          ></p-datepicker>
        </div>
        <div class="flex flex-col gap-1">
          <label
            for="endTime"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Konec</label
          >
          <p-datepicker
            id="endTime"
            [(ngModel)]="endTime"
            name="endTime"
            timeOnly
            placeholder="HH:mm"
            [disabled]="readonly()"
            class="w-full"
          ></p-datepicker>
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-surface-400 uppercase tracking-wide">Délka sezení</label>
        <span class="text-sm text-surface-600 py-2">
          @if (duration(); as d) {
            {{ d }} min
          } @else {
            <span class="text-surface-300 italic">Vyplňte začátek a konec</span>
          }
        </span>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label
            for="format"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Forma</label
          >
          <app-form-select
            id="format"
            [formField]="sessionForm.format"
            [options]="formatOptions"
            placeholder="Vyberte"
            [showClear]="true"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label
            for="type"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Typ</label
          >
          <app-form-select
            id="type"
            [formField]="sessionForm.type"
            [options]="typeOptions"
            placeholder="Vyberte"
            [showClear]="true"
          />
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label
          for="price"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Cena (Kč)</label
        >
        <p-inputNumber
          id="price"
          [(ngModel)]="price"
          name="price"
          [min]="0"
          [disabled]="readonly()"
          class="w-full"
        ></p-inputNumber>
      </div>
    </div>
  </div>
</form>
