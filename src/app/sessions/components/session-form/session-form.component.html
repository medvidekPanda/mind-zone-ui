<div class="grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-6 h-full">
  <!-- Sidebar -->
  <aside class="flex flex-col gap-4 h-full">
    <div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm p-5 space-y-4 flex-1">
      <!-- Klient -->
      <div class="flex flex-col gap-1">
        <label
          for="clientId"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Klient</label
        >
        <app-form-select
          id="clientId"
          [formField]="sessionForm.clientId"
          [options]="clientOptions()"
          placeholder="Vyberte klienta"
          [showClear]="true"
        />
      </div>

      <!-- Datum -->
      <div class="flex flex-col gap-1">
        <label
          for="date"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Datum</label
        >
        <app-form-datepicker
          id="date"
          [formField]="sessionForm.date"
          placeholder="Datum"
        />
      </div>

      <!-- Čas -->
      <div class="grid grid-cols-2 gap-2">
        <div class="flex flex-col gap-1">
          <label
            for="startTime"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Začátek</label
          >
          <p-datepicker
            id="startTime"
            [(ngModel)]="startTime"
            name="startTime"
            timeOnly
            placeholder="HH:mm"
            [disabled]="readonly()"
            appendTo="body"
            class="w-full"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label
            for="endTime"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Konec</label
          >
          <p-datepicker
            id="endTime"
            [(ngModel)]="endTime"
            name="endTime"
            timeOnly
            placeholder="HH:mm"
            [disabled]="readonly()"
            appendTo="body"
            class="w-full"
          />
        </div>
      </div>

      @if (duration(); as d) {
        <p class="text-xs text-surface-400">
          Délka: <span class="font-semibold text-surface-600">{{ d }} min</span>
        </p>
      }

      <!-- Forma + Typ -->
      <div class="grid grid-cols-2 gap-2">
        <div class="flex flex-col gap-1">
          <label
            for="form"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Forma</label
          >
          <app-form-select
            id="form"
            [formField]="sessionForm.form"
            [options]="formOptions"
            placeholder="Vyberte"
            [showClear]="true"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label
            for="type"
            class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
            >Typ</label
          >
          <app-form-select
            id="type"
            [formField]="sessionForm.type"
            [options]="typeOptions"
            placeholder="Vyberte"
            [showClear]="true"
          />
        </div>
      </div>

      <!-- Cena -->
      <div class="flex flex-col gap-1">
        <label
          for="price"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Cena (Kč)</label
        >
        <p-inputNumber
          id="price"
          [(ngModel)]="price"
          name="price"
          [min]="0"
          [disabled]="readonly()"
          class="w-full"
        />
      </div>

      <!-- Úhrada -->
      <div>
        <p-tag
          [value]="paid() ? 'Zaplaceno' : 'Čeká na úhradu'"
          [severity]="paid() ? 'success' : 'warn'"
          [rounded]="true"
        />
      </div>

      <!-- Témata -->
      <div class="flex flex-col gap-1">
        <label
          for="tags"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Témata sezení</label
        >
        <p-multiSelect
          id="tags"
          [options]="tagOptions()"
          [(ngModel)]="tags"
          name="tags"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte témata"
          [disabled]="readonly()"
          appendTo="body"
          class="w-full"
        />
      </div>
    </div>

    <!-- Akce -->
    @if (showActions()) {
      <div class="flex flex-col gap-2">
        <button
          (click)="save()"
          [disabled]="!sessionForm().valid()"
          type="button"
          pButton
          label="Uložit záznam"
          icon="pi pi-check"
        ></button>
      </div>
    }
  </aside>

  <!-- Main content – taby -->
  <main class="min-h-0 h-full">
    <p-tabs
      value="notes"
      class="h-full"
    >
      <p-tablist>
        <p-tab value="notes"> <i class="pi pi-pen-to-square mr-2"></i>Poznámky </p-tab>
        <p-tab value="transcription"> <i class="pi pi-microphone mr-2"></i>Přepis </p-tab>
        <p-tab value="summary"> <i class="pi pi-sparkles mr-2"></i>Shrnutí </p-tab>
        <p-tab value="attachments">
          <i class="pi pi-paperclip mr-2"></i>Přílohy
          @if (attachmentCount() > 0) {
            <p-badge
              [value]="'' + attachmentCount()"
              severity="info"
              class="ml-1"
            />
          }
        </p-tab>
      </p-tablist>
      <p-tabpanels class="mt-2">
        <p-tabpanel value="notes">
          <div class="flex flex-col gap-1">
            <div class="flex items-center justify-between mb-1">
              <label
                for="notes"
                class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
                >Poznámky terapeuta</label
              >
              <span class="text-xs text-surface-400 italic">Důvěrné</span>
            </div>
            <textarea
              pInputText
              id="notes"
              [formField]="sessionForm.notes"
              rows="20"
              placeholder="Vlastní postřehy, hypotézy, plán pro příští sezení…"
              class="w-full resize-y font-serif leading-relaxed"
            ></textarea>
          </div>
        </p-tabpanel>
        <p-tabpanel value="transcription">
          <div class="flex flex-col gap-1">
            <div class="flex items-center justify-between mb-1">
              <label
                for="transcription"
                class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
                >Přepis záznamu</label
              >
              <span class="text-xs text-blue-400 italic">Mock</span>
            </div>
            <textarea
              pInputText
              id="transcription"
              [formField]="sessionForm.transcription"
              rows="20"
              placeholder="Přepis audio záznamu ze sezení…"
              class="w-full resize-y font-mono text-sm leading-relaxed"
            ></textarea>
          </div>
        </p-tabpanel>
        <p-tabpanel value="summary">
          <div class="flex flex-col gap-1">
            <div class="flex items-center justify-between mb-1">
              <label
                for="summary"
                class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
                >Průběh a obsah sezení</label
              >
              <span class="text-xs text-blue-400 italic">Mock</span>
            </div>
            <textarea
              pInputText
              id="summary"
              [formField]="sessionForm.summary"
              rows="20"
              placeholder="Shrnutí průběhu sezení generované z přepisu…"
              class="w-full resize-y leading-relaxed"
            ></textarea>
          </div>
        </p-tabpanel>
        <p-tabpanel value="attachments">
          <app-session-attachments
            [sessionId]="sessionDetail()?.id ?? null"
            [attachments]="attachments()"
            [pendingFiles]="pendingFiles()"
            (fileAdded)="onFileAdded($event)"
            (attachmentUploaded)="onAttachmentUploaded($event)"
          />
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </main>
</div>
