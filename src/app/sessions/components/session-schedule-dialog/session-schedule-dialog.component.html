<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Naplánovat sezení"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-lg"
>
  <div class="flex flex-col gap-4 pt-1">
    <div class="flex flex-col gap-1">
      <label
        for="dlg-client"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Klient</label
      >
      <p-select
        appendTo="body"
        id="dlg-client"
        [options]="clientOptions"
        [(ngModel)]="schedule.clientId"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte klienta"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label
        for="dlg-date"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Datum</label
      >
      <p-datepicker
        appendTo="body"
        id="dlg-date"
        [(ngModel)]="schedule.date"
        dateFormat="dd.mm.yy"
        placeholder="Vyberte datum"
        class="w-full"
      />
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-start"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Začátek</label
        >
        <p-datepicker
          appendTo="body"
          id="dlg-start"
          [(ngModel)]="schedule.startTime"
          timeOnly
          placeholder="HH:mm"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-end"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Konec</label
        >
        <p-datepicker
          appendTo="body"
          id="dlg-end"
          [(ngModel)]="schedule.endTime"
          timeOnly
          placeholder="HH:mm"
          class="w-full"
        />
      </div>
    </div>

    @if (duration(); as d) {
      <p class="m-0 text-sm text-surface-500">
        Délka sezení: <strong>{{ d }} min</strong>
      </p>
    }

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-form"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Forma</label
        >
        <p-select
          appendTo="body"
          id="dlg-form"
          [options]="formOptions"
          [(ngModel)]="schedule.form"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-type"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Typ</label
        >
        <p-select
          appendTo="body"
          id="dlg-type"
          [options]="typeOptions"
          [(ngModel)]="schedule.type"
          optionLabel="label"
          optionValue="value"
          placeholder="Vyberte"
          class="w-full"
        />
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Zrušit"
      severity="secondary"
      [text]="true"
      (click)="close()"
    />
    <p-button
      label="Naplánovat"
      icon="pi pi-calendar-plus"
      (click)="onSave()"
    />
  </ng-template>
</p-dialog>
