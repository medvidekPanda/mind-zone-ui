<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Naplánovat sezení"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-lg"
>
  <div class="flex flex-col gap-4 pt-1">
    <!-- Klient -->
    <div class="flex flex-col gap-1">
      <label
        for="dlg-client"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Klient</label
      >
      <p-select
        appendTo="body"
        id="dlg-client"
        [options]="clientOptions()"
        [(ngModel)]="schedule.client"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte klienta"
        class="w-full"
      ></p-select>
    </div>

    <!-- Datum + čas -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-date"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Datum</label
        >
        <p-datepicker
          appendTo="body"
          id="dlg-date"
          [(ngModel)]="schedule.date"
          dateFormat="dd.mm.yy"
          placeholder="Datum"
          class="w-full"
        ></p-datepicker>
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-time"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Čas</label
        >
        <p-datepicker
          appendTo="body"
          id="dlg-time"
          [(ngModel)]="schedule.time"
          timeOnly
          placeholder="HH:mm"
          class="w-full"
        ></p-datepicker>
      </div>
    </div>

    <!-- Délka + Forma -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-duration"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Délka</label
        >
        <p-select
          appendTo="body"
          id="dlg-duration"
          [options]="durationOptions()"
          [(ngModel)]="schedule.duration"
          optionLabel="label"
          optionValue="value"
          placeholder="Délka"
          class="w-full"
        ></p-select>
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-form"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Forma</label
        >
        <p-select
          appendTo="body"
          id="dlg-form"
          [options]="formOptions()"
          [(ngModel)]="schedule.form"
          optionLabel="label"
          optionValue="value"
          placeholder="Forma"
          class="w-full"
        ></p-select>
      </div>
    </div>

    <!-- Typ -->
    <div class="flex flex-col gap-1">
      <label
        for="dlg-type"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Typ sezení</label
      >
      <p-select
        appendTo="body"
        id="dlg-type"
        [options]="typeOptions()"
        [(ngModel)]="schedule.type"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte typ"
        class="w-full"
      ></p-select>
    </div>

    <!-- Terapeut -->
    <div class="flex flex-col gap-1">
      <label
        for="dlg-therapist"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Terapeut</label
      >
      <p-select
        appendTo="body"
        id="dlg-therapist"
        [options]="therapistOptions()"
        [(ngModel)]="schedule.therapist"
        optionLabel="label"
        optionValue="value"
        placeholder="Vyberte terapeuta"
        class="w-full"
      ></p-select>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Zrušit"
      severity="secondary"
      [text]="true"
      (click)="close()"
    />
    <p-button
      label="Naplánovat"
      icon="pi pi-calendar-plus"
      (click)="onSave()"
    />
  </ng-template>
</p-dialog>
