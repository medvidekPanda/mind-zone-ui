<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Naplánovat sezení"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-lg"
>
  <form [formRoot]="scheduleForm" class="flex flex-col gap-4 pt-1">
    <div class="flex flex-col gap-1">
      <label
        for="dlg-client"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Klient</label
      >
      <app-form-select
        id="dlg-client"
        [formField]="scheduleForm.clientId"
        [options]="clientOptions()"
        placeholder="Vyberte klienta"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label
        for="dlg-date"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Datum</label
      >
      <app-form-datepicker
        id="dlg-date"
        [formField]="scheduleForm.date"
        placeholder="Vyberte datum"
      />
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-start"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Začátek</label
        >
        <app-form-timepicker
          id="dlg-start"
          [formField]="scheduleForm.startTime"
          placeholder="HH:mm"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-end"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Konec</label
        >
        <app-form-timepicker
          id="dlg-end"
          [formField]="scheduleForm.endTime"
          placeholder="HH:mm"
        />
      </div>
    </div>

    @if (duration(); as d) {
      <p class="m-0 text-sm text-surface-500">
        Délka sezení: <strong>{{ d }} min</strong>
      </p>
    }

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1">
        <label
          for="dlg-form"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Forma</label
        >
        <app-form-select
          id="dlg-form"
          [formField]="scheduleForm.form"
          [options]="formOptions"
          placeholder="Vyberte"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label
          for="dlg-type"
          class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
          >Typ</label
        >
        <app-form-select
          id="dlg-type"
          [formField]="scheduleForm.type"
          [options]="typeOptions"
          placeholder="Vyberte"
        />
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Zrušit"
      severity="secondary"
      [text]="true"
      (click)="close()"
    />
    <p-button
      label="Naplánovat"
      icon="pi pi-calendar-plus"
      (click)="onSave()"
    />
  </ng-template>
</p-dialog>
