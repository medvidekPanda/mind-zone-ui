<div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm overflow-hidden">
  <div class="flex items-stretch">
    <div
      class="w-1.5 flex-shrink-0"
      [class]="paid() ? 'bg-green-500' : 'bg-amber-400'"
    ></div>
    <div class="flex-1 p-4 space-y-3">
      <div class="flex items-center justify-between">
        <p class="font-bold text-primary-600 text-lg">{{ price() }} Kč</p>
        <p-tag
          [value]="paid() ? 'Zaplaceno' : 'Čeká na úhradu'"
          [severity]="paid() ? 'success' : 'warn'"
          [rounded]="true"
        />
      </div>
      <div class="flex items-center gap-2">
        <p-checkbox
          [ngModel]="paid()"
          (ngModelChange)="paid.set($event)"
          [binary]="true"
          inputId="paidSidebar"
          [disabled]="!editable()"
        ></p-checkbox>
        <label
          for="paidSidebar"
          class="text-sm text-surface-700"
          [class.cursor-pointer]="editable()"
        >Sezení zaplaceno</label>
      </div>
    </div>
  </div>
</div>
