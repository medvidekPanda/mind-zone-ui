<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Spustit přepis"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-sm"
>
  <form [formRoot]="transcribeForm" class="flex flex-col gap-4 pt-1">
    <p class="text-sm text-surface-500 m-0">
      {{ attachmentName() }}
    </p>

    <div class="flex flex-col gap-1">
      <label
        for="dlg-speakers"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Počet mluvčích</label
      >
      <app-form-input-number
        id="dlg-speakers"
        [formField]="transcribeForm.speakerCount"
        [minValue]="1"
        [maxValue]="20"
        [showButtons]="true"
        buttonLayout="horizontal"
        incrementButtonIcon="pi pi-plus"
        decrementButtonIcon="pi pi-minus"
      />
      <span class="text-xs text-surface-400">Pro terapeutické sezení obvykle 2</span>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Zrušit"
      severity="secondary"
      [text]="true"
      (click)="close()"
    />
    <p-button
      label="Spustit přepis"
      icon="pi pi-microphone"
      (click)="onConfirm()"
    />
  </ng-template>
</p-dialog>
