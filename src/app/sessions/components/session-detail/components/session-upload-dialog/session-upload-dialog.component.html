<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  header="Nahrát záznam"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="w-full max-w-md"
>
  <div class="flex flex-col gap-4 pt-1">
    @if (file(); as f) {
      <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-surface-50 border border-surface-100">
        <i class="pi pi-file-audio text-primary-500 text-lg shrink-0"></i>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-surface-700 truncate m-0">{{ f.name }}</p>
          <span class="text-xs text-surface-400">{{ formatSize(f.size) }}</span>
        </div>
      </div>
    }

    <div class="flex flex-col gap-1">
      <label
        for="dlg-speakers"
        class="text-xs font-semibold text-surface-400 uppercase tracking-wide"
        >Počet mluvčích</label
      >
      <p-inputNumber
        id="dlg-speakers"
        [ngModel]="speakerCount()"
        (ngModelChange)="speakerCount.set($event)"
        [min]="1"
        [max]="20"
        [showButtons]="true"
        buttonLayout="horizontal"
        incrementButtonIcon="pi pi-plus"
        decrementButtonIcon="pi pi-minus"
        class="w-full"
      />
      <span class="text-xs text-surface-400">Pro terapeutické sezení obvykle 2</span>
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox
        inputId="dlg-transcribe"
        [ngModel]="transcribe()"
        (ngModelChange)="transcribe.set($event)"
        [binary]="true"
      />
      <label for="dlg-transcribe" class="text-sm text-surface-600 cursor-pointer"
        >Automaticky přepsat po nahrání</label
      >
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Zrušit"
      severity="secondary"
      [text]="true"
      (click)="close()"
    />
    <p-button
      label="Nahrát"
      icon="pi pi-upload"
      (click)="onConfirm()"
    />
  </ng-template>
</p-dialog>
