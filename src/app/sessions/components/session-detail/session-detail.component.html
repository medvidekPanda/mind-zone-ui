<p-menu
  #actionsMenu
  [model]="actionMenuItems()"
  [popup]="true"
  appendTo="body"
/>

<app-page-header [title]="pageTitle()">
  <div
    actions
    class="flex gap-2"
  >
    <a
      routerLink="/sessions"
      pButton
      label="Zpět"
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
    ></a>
    @if (!editing() && !isNewSession) {
      <button
        type="button"
        pButton
        icon="pi pi-ellipsis-v"
        severity="secondary"
        [text]="true"
        (click)="actionsMenu.toggle($event)"
      ></button>
      <button
        type="button"
        pButton
        label="Upravit"
        icon="pi pi-pencil"
        (click)="startEdit()"
      ></button>
    }
  </div>
</app-page-header>

<div class="overflow-y-auto flex-1 py-6 space-y-6">
  <app-session-form
    [clientId]="clientIdFromUrl()"
    [readonly]="!editing()"
    [showActions]="editing()"
    [paid]="paid()"
    (paidChange)="paid.set($event)"
    (saved)="onSaved()"
    (cancelled)="onCancelled()"
  />
</div>
