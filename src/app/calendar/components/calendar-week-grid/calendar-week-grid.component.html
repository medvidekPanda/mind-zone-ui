<div class="flex min-h-0 min-w-0 flex-1 flex-col [-webkit-overflow-scrolling:touch]">
  <div class="min-h-0 min-w-0 flex-1 overflow-auto overscroll-contain [scrollbar-gutter:stable]">
    <div
      class="flex w-full flex-col"
      [style.min-width]="weekGridMinBlockWidth"
    >
      <div class="sticky top-0 z-30 flex w-full shrink-0 border-b border-slate-200 bg-slate-800 shadow-sm">
        <div
          class="sticky left-0 z-[45] w-14 shrink-0 self-stretch border-r border-slate-700 bg-slate-800"
          aria-hidden="true"
        ></div>
        <div
          class="flex min-w-0 flex-1"
          data-calendar-week-grid-headers
        >
          @for (day of weekDays(); track day.isoKey) {
            <div
              class="min-w-0 flex-1 border-l border-slate-700 bg-slate-800 py-3 text-center first:border-l-0"
              [style.min-width.px]="dayColumnMinPx"
            >
              <div
                class="text-xs font-semibold uppercase tracking-wide"
                [class.text-teal-300]="day.isToday"
                [class.text-slate-400]="!day.isToday"
              >
                {{ day.weekdayShort }}
              </div>
              <div
                class="mt-1 text-lg font-bold sm:text-xl"
                [class.text-teal-400]="day.isToday"
                [class.text-slate-100]="!day.isToday"
              >
                {{ day.dayNum }}
              </div>
            </div>
          }
        </div>
      </div>

      <div class="flex w-full shrink-0">
        <div
          class="sticky left-0 z-20 w-14 shrink-0 border-r border-slate-200 bg-slate-50 pr-2 text-right text-xs text-slate-500 select-none"
        >
          @for (hour of hoursRange; track hour) {
            <div
              class="flex items-start justify-end leading-none tabular-nums"
              [style.height.px]="gridHeightPx / hoursRange.length"
            >
              {{ hour === 0 ? "" : hour + ":00" }}
            </div>
          }
        </div>
        <div
          class="relative flex min-w-0 flex-1"
          data-calendar-week-grid
          [style.min-height.px]="gridHeightPx"
        >
          @for (day of weekDays(); track day.isoKey) {
            <app-calendar-day-column [day]="day" />
          }
        </div>
      </div>
    </div>
  </div>
</div>
