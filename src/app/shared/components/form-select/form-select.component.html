<p-select
  [id]="id()"
  [ngModel]="value()"
  (ngModelChange)="value.set($event)"
  [options]="options()"
  optionLabel="label"
  optionValue="value"
  [placeholder]="placeholder()"
  [showClear]="showClear()"
  [invalid]="invalid()"
  [disabled]="disabled()"
  (onBlur)="touched.set(true)"
  appendTo="body"
  class="w-full"
/>
