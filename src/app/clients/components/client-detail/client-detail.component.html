@let _newClient = isNewClient();

@if (_newClient) {
  <app-client-create
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancel)="cancel()"
  />
} @else {
  <app-client-edit
    [editing]="editing()"
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancelEdit)="cancelEdit()"
    (startEdit)="startEdit()"
  />
}
