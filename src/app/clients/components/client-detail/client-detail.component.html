@let _client = client();

<p-menu #actionsMenu [model]="actionMenuItems" [popup]="true" appendTo="body" />

<app-page-header
  [title]="
    isNewClient
      ? 'Nový klient'
      : editing()
        ? 'Úprava klienta'
        : 'Detail klienta: ' + _client?.firstName + ' ' + _client?.lastName
  "
>
  <div
    actions
    class="flex gap-2"
  >
    <a
      routerLink="/clients"
      pButton
      label="Zpět"
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
    ></a>
    @if (!editing() && !isNewClient) {
      <button
        type="button"
        pButton
        icon="pi pi-ellipsis-v"
        severity="secondary"
        [text]="true"
        (click)="actionsMenu.toggle($event)"
      ></button>
      <a
        [routerLink]="['/sessions/new']"
        [queryParams]="{ clientId: _client?.id }"
        pButton
        label="Nové sezení"
        icon="pi pi-plus"
        severity="success"
      ></a>
    }
  </div>
</app-page-header>

<div class="overflow-y-auto flex-1 py-6 space-y-6">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1">
      <app-client-profile-card [client]="_client" />
      <app-client-stats class="mt-6" />
    </div>

    <div class="lg:col-span-2">
      <p-card
        header="Údaje klienta"
        class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden h-full"
      >
        <app-client-form
          [readonly]="!editing()"
          [showActions]="editing()"
          (saved)="onSaved()"
          (cancelled)="onCancelled()"
        />
      </p-card>
    </div>
  </div>

  @if (_client) {
    <app-session-schedule-dialog
      [visible]="scheduleDialogVisible()"
      (visibleChange)="scheduleDialogVisible.set($event)"
      [clientId]="_client.id"
    />
  }
</div>
