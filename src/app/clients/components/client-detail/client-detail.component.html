@if (isNewClient()) {
  <app-client-create
    [client]="client()"
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancel)="cancel()"
  />
} @else {
  <app-client-edit
    [client]="client()"
    [editing]="editing()"
    (formChanged)="onFormChanged($event)"
    (save)="onSave()"
    (cancelEdit)="cancelEdit()"
    (startEdit)="startEdit()"
  />
}
