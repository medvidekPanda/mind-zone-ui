@let _client = client();

<p-menu
  #actionsMenu
  [model]="actionMenuItems"
  [popup]="true"
  appendTo="body"
/>

<app-page-header
  [title]="
    isNewClient()
      ? 'Nový klient'
      : isEditing()
        ? 'Úprava klienta'
        : 'Detail klienta: ' + _client?.firstName + ' ' + _client?.lastName
  "
>
  <div
    actions
    class="flex gap-2"
  >
    <a
      routerLink="/clients"
      pButton
      label="Zpět"
      icon="pi pi-arrow-left"
      severity="secondary"
      [text]="true"
    ></a>
    @if (!isEditing() && !isNewClient()) {
      <button
        type="button"
        pButton
        icon="pi pi-ellipsis-v"
        severity="secondary"
        [text]="true"
        (click)="actionsMenu.toggle($event)"
      ></button>
      <a
        [routerLink]="['/sessions/new']"
        [queryParams]="{ clientId: _client?.id }"
        pButton
        label="Nové sezení"
        icon="pi pi-plus"
        severity="success"
      ></a>
    }
  </div>
</app-page-header>

<div class="flex-1 relative overflow-y-hidden">
  @if (isLoading()) {
    <div class="overflow-y-auto h-full py-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-surface-0 rounded-2xl border border-surface-200 shadow-sm p-5 space-y-4">
          <p-skeleton
            width="4rem"
            height="4rem"
            borderRadius="50%"
          />
          @for (i of [1, 2, 3]; track i) {
            <p-skeleton
              height="1rem"
              borderRadius="4px"
            />
          }
        </div>

        <div class="lg:col-span-2 bg-surface-0 rounded-2xl border border-surface-200 shadow-sm p-6 space-y-4">
          @for (i of [1, 2, 3, 4, 5]; track i) {
            <div class="flex flex-col gap-2">
              <p-skeleton
                width="6rem"
                height="0.75rem"
                borderRadius="4px"
              />
              <p-skeleton
                height="2.25rem"
                borderRadius="8px"
              />
            </div>
          }
        </div>
      </div>
    </div>
  } @else {
    <div class="overflow-y-auto h-full py-6 space-y-6">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 flex flex-col gap-6">
          <app-client-profile-card [client]="_client" />
          <app-client-stats />
        </div>

        <div class="lg:col-span-2">
          <p-card
            header="Údaje klienta"
            class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden h-full"
          >
            <app-client-form (cancelled)="onCancelled()" />
          </p-card>
        </div>
      </div>
    </div>
  }
</div>
