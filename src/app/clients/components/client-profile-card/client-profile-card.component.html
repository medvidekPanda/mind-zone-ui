<p-card class="rounded-2xl border border-slate-200 shadow-sm overflow-hidden text-center">
  <div class="flex flex-col items-center py-6">
    @if (client()) {
      <p-avatar
        [label]="(client()!.firstName || '')[0] + (client()!.lastName || '')[0]"
        shape="circle"
        size="xlarge"
        class="bg-teal-100 text-teal-600 font-bold mb-4 border-4 border-white shadow-md"
      />
      <h2 class="m-0 text-xl font-bold text-slate-900">{{ client()!.firstName }} {{ client()!.lastName }}</h2>
      <p-tag
        [value]="statusLabel()"
        [severity]="client()!.status === ClientStatus.ACTIVE ? 'success' : 'secondary'"
        [rounded]="true"
        class="mt-2"
      />
    } @else {
      <p-avatar
        icon="pi pi-user"
        shape="circle"
        size="xlarge"
        class="bg-slate-100 text-slate-400 mb-4 border-4 border-white shadow-md"
      />
      <h2 class="m-0 text-xl font-bold text-slate-400">Nový klient</h2>
    }
  </div>
</p-card>
