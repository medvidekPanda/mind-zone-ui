<form class="flex flex-col gap-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col gap-2">
      <label for="firstName">Jméno</label>
      <input
        pInputText
        id="firstName"
        [formField]="clientForm.firstName"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="lastName">Příjmení</label>
      <input
        pInputText
        id="lastName"
        [formField]="clientForm.lastName"
        class="w-full"
      />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col gap-2">
      <label for="email">E-mail</label>
      <input
        pInputText
        id="email"
        type="email"
        [formField]="clientForm.email"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="phone">Telefon</label>
      <input
        pInputText
        id="phone"
        type="tel"
        [formField]="clientForm.phone"
        class="w-full"
      />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="flex flex-col gap-2">
      <label for="gender">Pohlaví</label>
      <app-form-select
        id="gender"
        [formField]="clientForm.gender"
        [options]="genderOptions"
        placeholder="Vyberte"
        [showClear]="true"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label for="birthDate">Datum narození</label>
      <app-form-datepicker
        id="birthDate"
        [formField]="clientForm.birthDate"
        placeholder="RRRR-MM-DD"
        [showClear]="true"
      />
    </div>
  </div>

  <div class="flex flex-col gap-2">
    <label for="status">Status</label>
    <app-form-select
      id="status"
      [formField]="clientForm.status"
      [options]="statusOptions"
      placeholder="Vyberte"
      [showClear]="true"
    />
  </div>
</form>
